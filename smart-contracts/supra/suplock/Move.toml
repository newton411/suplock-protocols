[package]
name = "suplock"
version = "0.1.0"

[addresses]
suplock = "0x0"    # Your package deployment address
std = "0x1"        # Move standard library
supra = "0x2"      # Supra framework

[dependencies]
# REQUIRED: Core Supra framework (includes everything you need)
SupraFramework = { git = "https://github.com/Entropy-Foundation/aptos-core.git", subdir = "aptos-move/framework/supra-framework", rev = "dev" }
